<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Snake</title>
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <main class="game-shell" aria-label="Snake">
      <header class="top-bar">
        <h1>Snake</h1>
        <div class="status-pill" id="status-label">Pret</div>
      </header>

      <section class="score-strip" aria-label="Scores">
        <div class="stat-block">
          <span class="stat-label">Score</span>
          <strong id="score-value">0</strong>
        </div>
        <div class="stat-block">
          <span class="stat-label">Meilleur</span>
          <strong id="best-value">0</strong>
        </div>
        <div class="stat-block">
          <span class="stat-label">Vitesse</span>
          <strong id="speed-value">1.0x</strong>
        </div>
        <div class="stat-block">
          <span class="stat-label">Mode</span>
          <strong id="mode-value">Standard</strong>
        </div>
      </section>

      <section class="mode-strip" aria-label="Mode de partie">
        <span class="mode-strip-label">Mode</span>
        <div class="mode-options" role="group" aria-label="Choix du mode de partie">
          <button class="mode-option selected" type="button" data-mode-key="standard" aria-pressed="true">Standard</button>
          <button class="mode-option" type="button" data-mode-key="quick" aria-pressed="false">Mode rapide</button>
        </div>
      </section>

      <section class="speed-strip" aria-label="Vitesse du serpent">
        <span class="speed-strip-label" id="speed-strip-label">Vitesse manuelle</span>
        <div class="speed-options" role="group" aria-label="Choix de vitesse">
          <button class="speed-option selected" type="button" data-speed-key="normal" aria-pressed="true">Normal</button>
          <button class="speed-option" type="button" data-speed-key="fast" aria-pressed="false">Rapide</button>
          <button class="speed-option" type="button" data-speed-key="turbo" aria-pressed="false">Turbo</button>
        </div>
      </section>

      <section class="board-wrap" aria-label="Plateau">
        <canvas
          id="game-canvas"
          width="480"
          height="480"
          tabindex="0"
          aria-label="Plateau de jeu Snake"
        ></canvas>
      </section>

      <section class="control-strip" aria-label="Actions">
        <button class="control-button primary" type="button" id="play-button">Jouer</button>
        <button class="control-button" type="button" id="pause-button">Pause</button>
        <button class="control-button" type="button" id="restart-button">Rejouer</button>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>

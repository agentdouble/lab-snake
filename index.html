<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Snake</title>
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <main class="game-shell" aria-label="Snake">
      <header class="top-bar">
        <h1>Snake</h1>
        <div class="top-actions">
          <div class="status-pill" id="status-label">Pret</div>
          <button
            class="icon-button"
            type="button"
            id="settings-button"
            aria-label="Ouvrir les reglages"
            aria-controls="settings-panel"
            aria-expanded="false"
            title="Reglages"
          >
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path>
              <path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.06.06a2.15 2.15 0 0 1-3.04 3.04l-.06-.06A1.8 1.8 0 0 0 14.74 19a1.8 1.8 0 0 0-1.09 1.64v.17a2.15 2.15 0 0 1-4.3 0v-.1A1.8 1.8 0 0 0 8.2 19a1.8 1.8 0 0 0-1.98.36l-.06.06a2.15 2.15 0 1 1-3.04-3.04l.06-.06A1.8 1.8 0 0 0 3.54 14a1.8 1.8 0 0 0-1.64-1.09h-.1a2.15 2.15 0 0 1 0-4.3h.1A1.8 1.8 0 0 0 3.54 7.5a1.8 1.8 0 0 0-.36-1.98l-.06-.06a2.15 2.15 0 1 1 3.04-3.04l.06.06A1.8 1.8 0 0 0 8.2 2.84h.16A1.8 1.8 0 0 0 9.35 1.2v-.1a2.15 2.15 0 0 1 4.3 0v.1a1.8 1.8 0 0 0 1.09 1.64h.16a1.8 1.8 0 0 0 1.98-.36l.06-.06a2.15 2.15 0 1 1 3.04 3.04l-.06.06A1.8 1.8 0 0 0 19.4 7.5v.16a1.8 1.8 0 0 0 1.64.99h.17a2.15 2.15 0 0 1 0 4.3h-.1A1.8 1.8 0 0 0 19.4 15Z"></path>
            </svg>
          </button>
        </div>
      </header>

      <section class="score-strip" aria-label="Scores">
        <div class="stat-block">
          <span class="stat-label">Score</span>
          <strong id="score-value">0</strong>
        </div>
        <div class="stat-block">
          <span class="stat-label">Meilleur</span>
          <strong id="best-value">0</strong>
        </div>
        <div class="stat-block">
          <span class="stat-label">Vitesse</span>
          <strong id="speed-value">1.0x</strong>
        </div>
      </section>

      <section class="board-wrap" aria-label="Plateau">
        <canvas
          id="game-canvas"
          width="480"
          height="480"
          tabindex="0"
          aria-label="Plateau de jeu Snake"
        ></canvas>
      </section>

      <section class="control-strip" aria-label="Actions">
        <button class="control-button primary" type="button" id="play-button">Jouer</button>
        <button class="control-button" type="button" id="pause-button">Pause</button>
        <button class="control-button" type="button" id="restart-button">Rejouer</button>
      </section>

      <section class="settings-layer" id="settings-layer" hidden>
        <button class="settings-backdrop" type="button" id="settings-backdrop" aria-label="Fermer les reglages"></button>
        <aside
          class="settings-panel"
          id="settings-panel"
          role="dialog"
          aria-modal="true"
          aria-labelledby="settings-title"
          tabindex="-1"
        >
          <header class="settings-header">
            <h2 id="settings-title">Reglages</h2>
            <button class="icon-button" type="button" id="settings-close-button" aria-label="Fermer les reglages" title="Fermer">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M18 6 6 18"></path>
                <path d="m6 6 12 12"></path>
              </svg>
            </button>
          </header>

          <div class="settings-section">
            <h3>Affichage</h3>
            <label class="switch-row" for="grid-toggle">
              <span>
                <span class="switch-title">Grille</span>
                <span class="switch-meta">Plateau quadrille</span>
              </span>
              <input class="switch-input" type="checkbox" id="grid-toggle">
            </label>
          </div>
        </aside>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>

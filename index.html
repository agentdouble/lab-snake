<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Snake</title>
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <main class="game-shell" aria-label="Snake">
      <header class="top-bar">
        <h1>Snake</h1>
        <div class="header-actions">
          <button
            class="settings-button"
            type="button"
            id="settings-button"
            aria-haspopup="dialog"
            aria-controls="settings-dialog"
          >Reglages</button>
          <div class="status-pill" id="status-label">Pret</div>
        </div>
      </header>

      <section class="score-strip" aria-label="Scores">
        <div class="stat-block">
          <span class="stat-label">Score</span>
          <strong id="score-value">0</strong>
        </div>
        <div class="stat-block">
          <span class="stat-label">Meilleur</span>
          <strong id="best-value">0</strong>
        </div>
        <div class="stat-block">
          <span class="stat-label">Vitesse</span>
          <strong id="speed-value">1.0x</strong>
        </div>
        <div class="stat-block">
          <span class="stat-label">Mode</span>
          <strong id="mode-value">Standard</strong>
        </div>
      </section>

      <section class="board-wrap" aria-label="Plateau">
        <canvas
          id="game-canvas"
          width="480"
          height="480"
          tabindex="0"
          aria-label="Plateau de jeu Snake"
        ></canvas>
      </section>

      <section class="control-strip" aria-label="Actions">
        <button class="control-button primary" type="button" id="play-button">Jouer</button>
        <button class="control-button" type="button" id="pause-button">Pause</button>
        <button class="control-button" type="button" id="restart-button">Rejouer</button>
      </section>

      <dialog class="settings-dialog" id="settings-dialog" aria-labelledby="settings-title">
        <form class="settings-panel" method="dialog" id="settings-form">
          <div class="settings-header">
            <h2 id="settings-title">Reglages</h2>
            <button class="settings-close" type="submit">Fermer</button>
          </div>

          <label class="settings-field" for="mode-setting">
            <span>Mode</span>
            <select id="mode-setting" name="mode"></select>
          </label>

          <label class="settings-field" for="speed-setting">
            <span id="speed-setting-label">Vitesse</span>
            <select id="speed-setting" name="speed"></select>
          </label>

          <label class="settings-field" for="color-setting">
            <span>Couleur</span>
            <select id="color-setting" name="color"></select>
          </label>

          <menu class="settings-actions">
            <button class="control-button" type="button" id="settings-reset-button">Defaut</button>
            <button class="control-button primary" type="submit">Valider</button>
          </menu>
        </form>
      </dialog>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
